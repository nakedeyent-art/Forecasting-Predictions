name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: oracle
          POSTGRES_PASSWORD: oracle
          POSTGRES_DB: oracle
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oracle -d oracle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: npm install
      - run: pip install -r apps/api/requirements.txt
      - run: npm run typecheck
      - run: npm run test:web
      - run: npm run test:api
      - run: DATABASE_URL="postgresql://oracle:oracle@localhost:5432/oracle" npm run prisma:validate
      - run: npm run build
